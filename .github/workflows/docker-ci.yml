jobs:
  compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Start Services
        run: |
          docker-compose up -d --build
          sleep 10

      - name: Test Backend
        run: |
          curl -f http://localhost:5000

      - name: Shutdown Services
        run: |
          docker-compose down
